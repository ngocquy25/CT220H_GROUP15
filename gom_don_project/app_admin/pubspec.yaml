name: app_admin
description: Phân hệ Quản trị viên - Quản lý Hub & Xuất báo cáo Excel (GomĐơn)
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared:
    path: ../shared
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  excel: ^4.0.2              # Xuất file Excel
  path_provider: ^2.1.2     # Lưu file vào thiết bị
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
