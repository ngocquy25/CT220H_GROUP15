org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# builtInKotlin=false required: Flutter 3.44.0 not yet compatible with builtInKotlin=true + newDsl=false combo
android.builtInKotlin=false
# newDsl=false required: Flutter Gradle plugin crashes with NullPointerException when newDsl=true
android.newDsl=false
android.overridePathCheck=true
org.jetbrains.kotlin.incremental=false
