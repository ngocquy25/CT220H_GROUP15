name: app_user
description: Phân hệ Người dùng - App đặt món & gom đơn cho khách hàng (GomĐơn)
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Shared models & services (dùng chung)
  shared:
    path: ../shared

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1

  # Bản đồ & Vị trí
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.0
  permission_handler: ^11.3.1

  # UI & Tiện ích
  flutter_countdown_timer: ^4.1.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Bauhaus93
      fonts:
        - asset: assets/fonts/BAUHS93.ttf
    - family: BeVietnamPro
      fonts:
        - asset: assets/fonts/BeVietnamPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/BeVietnamPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/BeVietnamPro-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BeVietnamPro-Bold.ttf
          weight: 700
