name: app_user
description: Phân hệ Người dùng - App đặt món & gom đơn cho khách hàng (GomĐơn)
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Shared models & services (dùng chung)
  shared:
    path: ../shared

  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0

  # Bản đồ & Vị trí
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  permission_handler: ^11.1.0

  # UI & Tiện ích
  flutter_countdown_timer: ^4.1.0
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
